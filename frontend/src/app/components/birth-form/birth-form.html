<div class="form-container">
    <h2>Enter Your Birth Details</h2>
    <form (submit)="onSubmit()">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" [(ngModel)]="userData.name" required>
        </div>
        <div class="form-group">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" name="dob" [(ngModel)]="userData.dob" required>
        </div>
        <div class="form-group">
            <label for="pob">Place of Birth</label>
            <input type="text" id="pob" name="pob" [(ngModel)]="userData.pob" required>
        </div>
        <div class="form-group">
            <label for="tob">Time of Birth</label>
            <input type="time" id="tob" name="tob" [(ngModel)]="userData.tob" required>
        </div>
        <button type="submit" [disabled]="loading">Get Prediction</button>
    </form>
    <div *ngIf="loading">Calculating your destiny...</div>
</div>
